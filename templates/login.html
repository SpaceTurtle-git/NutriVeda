{% extends "base.html" %}
{% block title %}Login — ĀyurvedaDiet{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-6 py-16">
  <div class="brutal-card bg-white p-8 space-y-6">
    <h2 class="font-display font-700 text-2xl">Login</h2>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="brutal-label">Email</label>
        <input type="email" id="email" class="brutal-input w-full" required />
      </div>
      <div>
        <label class="brutal-label">Password</label>
        <input type="password" id="password" class="brutal-input w-full" required />
      </div>
      <button type="submit" class="brutal-btn bg-bark text-cream w-full py-3 font-display font-700">
        Log In
      </button>
    </form>
    <p class="text-sm text-center">Don't have an account? <a href="{{ url_for('main.signup') }}" class="text-sage font-600">Sign up</a></p>
  </div>
</section>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = data.redirect;
    } else {
      showToast(data.error || 'Login failed', 'error');
    }
  });
</script>
{% endblock %}
